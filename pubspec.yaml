name: petg
description: "Plataforma móvil para conectar dueños con cuidadores de mascotas."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Gestión de Estado
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5

  # Almacenamiento Local y Seguridad
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.0.0

  # Conectividad y Red (API REST)
  dio: ^5.4.0

  # Funciones Nativas e Integraciones Externas
  google_maps_flutter: ^2.5.3
  geolocator: ^11.0.0
  onesignal_flutter: ^5.1.0
  image_picker: ^1.0.7

  # Internacionalización y Utilidades
  intl: ^0.19.0
  cupertino_icons: ^1.0.6

  # 🔥 Firebase (Organizado correctamente aquí)
  firebase_core: ^3.1.1
  cloud_firestore: ^5.0.1
  firebase_auth: ^5.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  
  # Generadores de código para Hive
  hive_generator: ^2.0.1
  build_runner: ^2.4.8

flutter:
  uses-material-design: true
  # Aquí incluiremos los assets (logos/iconos) en pasos posteriores